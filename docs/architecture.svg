<svg width="920" height="600" viewBox="0 0 920 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#8b8b96" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="600" rx="12" fill="#f7f6fc"/>

  <!-- Channels row -->
  <g>
    <rect x="60" y="36" width="240" height="64" rx="10" fill="#ffffff" stroke="#d9d7e6"/>
    <text x="180" y="63" text-anchor="middle" font-size="15" font-weight="600" fill="#1c1b22">Merchant dashboard</text>
    <text x="180" y="84" text-anchor="middle" font-size="12" fill="#6b6a76">hosted web UI · login → chat → approve</text>

    <rect x="340" y="36" width="240" height="64" rx="10" fill="#ffffff" stroke="#d9d7e6"/>
    <text x="460" y="63" text-anchor="middle" font-size="15" font-weight="600" fill="#1c1b22">Any MCP client</text>
    <text x="460" y="84" text-anchor="middle" font-size="12" fill="#6b6a76">Claude Desktop, IDEs · 12 tools over MCP</text>

    <rect x="620" y="36" width="240" height="64" rx="10" fill="#ffffff" stroke="#d9d7e6"/>
    <text x="740" y="63" text-anchor="middle" font-size="15" font-weight="600" fill="#1c1b22">CLI</text>
    <text x="740" y="84" text-anchor="middle" font-size="12" fill="#6b6a76">npm run chat · dev &amp; testing</text>
  </g>

  <line x1="180" y1="100" x2="285" y2="160" stroke="#8b8b96" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="460" y1="100" x2="460" y2="160" stroke="#8b8b96" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="740" y1="100" x2="635" y2="160" stroke="#8b8b96" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Autopilot service -->
  <rect x="150" y="166" width="620" height="180" rx="12" fill="#efeafd" stroke="#6C4CE0" stroke-width="1.6"/>
  <text x="174" y="196" font-size="16" font-weight="700" fill="#3c2f8f">Autopilot agent service</text>
  <text x="174" y="216" font-size="12" fill="#5f54a8">Node + TypeScript · deployed on Alibaba Cloud Function Compute (Singapore) · multi-tenant: acts with each merchant's own token</text>

  <g>
    <rect x="174" y="232" width="136" height="90" rx="8" fill="#ffffff" stroke="#c9bff2"/>
    <text x="242" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1b22">Qwen tool loop</text>
    <text x="242" y="281" text-anchor="middle" font-size="11" fill="#6b6a76">function calling</text>
    <text x="242" y="297" text-anchor="middle" font-size="11" fill="#6b6a76">retry on empty turns</text>

    <rect x="322" y="232" width="136" height="90" rx="8" fill="#ffffff" stroke="#c9bff2"/>
    <text x="390" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1b22">Approval gate</text>
    <text x="390" y="281" text-anchor="middle" font-size="11" fill="#6b6a76">propose → approve</text>
    <text x="390" y="297" text-anchor="middle" font-size="11" fill="#6b6a76">default-deny actions</text>

    <rect x="470" y="232" width="136" height="90" rx="8" fill="#ffffff" stroke="#c9bff2"/>
    <text x="538" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1b22">Grounding layer</text>
    <text x="538" y="281" text-anchor="middle" font-size="11" fill="#6b6a76">catalog prices win —</text>
    <text x="538" y="297" text-anchor="middle" font-size="11" fill="#6b6a76">no invented invoices</text>

    <rect x="618" y="232" width="136" height="90" rx="8" fill="#ffffff" stroke="#c9bff2"/>
    <text x="686" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#1c1b22">Customer memory</text>
    <text x="686" y="281" text-anchor="middle" font-size="11" fill="#6b6a76">history, balances —</text>
    <text x="686" y="297" text-anchor="middle" font-size="11" fill="#6b6a76">grounded in live data</text>
  </g>

  <!-- Qwen -->
  <rect x="60" y="392" width="330" height="120" rx="12" fill="#fff1e6" stroke="#ff6a00" stroke-width="1.6"/>
  <text x="84" y="422" font-size="15" font-weight="700" fill="#a34400">Qwen on Alibaba Cloud</text>
  <text x="84" y="442" font-size="12" fill="#7c5230">Model Studio / DashScope · OpenAI-compatible</text>
  <text x="84" y="466" font-size="12" fill="#7c5230">qwen-max — orchestration &amp; reasoning</text>
  <text x="84" y="484" font-size="12" fill="#7c5230">qwen-turbo — high-volume routing (configurable)</text>
  <text x="84" y="502" font-size="12" fill="#7c5230">qwen-vl-max — photo → product (roadmap)</text>

  <!-- ImpalaFlow -->
  <rect x="430" y="392" width="430" height="120" rx="12" fill="#e4f5ee" stroke="#1d9e75" stroke-width="1.6"/>
  <text x="454" y="422" font-size="15" font-weight="700" fill="#0d6b4c">ImpalaFlow — live SaaS (existing)</text>
  <text x="454" y="442" font-size="12" fill="#3c6b5b">api.impalaflow.com · same REST API the app uses · zero backend changes</text>
  <text x="454" y="466" font-size="12" fill="#3c6b5b">products &amp; stock · orders · invoicing · donations · contacts &amp; groups · forms</text>
  <text x="454" y="484" font-size="12" fill="#3c6b5b">payments settle via Paystack (bank / mobile money)</text>

  <line x1="330" y1="346" x2="255" y2="386" stroke="#ff6a00" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="218" y="372" font-size="11" fill="#a34400">model calls</text>
  <line x1="560" y1="346" x2="630" y2="386" stroke="#1d9e75" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="612" y="372" font-size="11" fill="#0d6b4c">tool calls</text>

  <text x="460" y="560" text-anchor="middle" font-size="12" fill="#6b6a76">Understands messy, multilingual customer messages (English · Pidgin · Swahili · French) and runs the business end-to-end — with the merchant approving every outward action.</text>
</svg>
