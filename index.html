  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--ink); height: 100vh;
    background: radial-gradient(1200px 600px at 80% -10%, #ece5fd 0%, var(--bg) 55%) fixed; }
  .hidden { display: none !important; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .msg, .block, .proposal, .result, .hints { animation: rise .28s ease both; }

  /* Login */
  #login { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 32px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(40,30,90,.08); }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; margin-bottom: 4px; }
  .dot { width: 28px; height: 28px; border-radius: 50%; background: var(--logo) center/cover no-repeat;
    position: relative; flex: none; }
  .dot::after { content: "⚡"; position: absolute; right: -5px; bottom: -5px; width: 15px; height: 15px;
    background: #fff; border: 1.5px solid var(--purple); border-radius: 50%; font-size: 8px;
    display: flex; align-items: center; justify-content: center; animation: pulseb 2.2s ease-in-out infinite; }
  .login-card .dot { width: 46px; height: 46px; }
  .login-card .dot::after { width: 19px; height: 19px; font-size: 10px; right: -6px; bottom: -6px; }
  @keyframes pulseb { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.18); } }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin: 14px 0 6px; }
  input { width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px; }
  input:focus { outline: none; border-color: var(--purple); }
  button { cursor: pointer; font-family: inherit; }
  .btn { background: var(--grad); color: #fff; border: none; padding: 12px; border-radius: 10px;
    font-weight: 600; font-size: 14px; width: 100%; margin-top: 20px; box-shadow: var(--shadow-sm); }
  .btn:hover { filter: brightness(1.06); }
  .btn:disabled { opacity: .6; cursor: default; }
  .err { color: #c0392b; font-size: 13px; margin-top: 12px; min-height: 16px; }

  /* Chat shell */
  #chat { height: 100vh; display: flex; flex-direction: column; }
  header { background: rgba(255,255,255,.85); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
    padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  header .brand { font-size: 16px; margin: 0; }
  .status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green);
    background: #e9f8f1; border: 1px solid #c6ecdb; padding: 3px 10px; border-radius: 999px; font-weight: 600; }
  .status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  header .who { margin-left: auto; font-size: 13px; color: var(--muted); font-weight: 600; }
  header .logout { background: none; border: 1px solid var(--line); color: var(--muted);
    padding: 6px 12px; border-radius: 8px; font-size: 13px; }

  .body-row { flex: 1; display: flex; overflow: hidden; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .stream { flex: 1; overflow-y: auto; padding: 24px; }
  .wrap { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  /* Stationary action menu */
  .side { width: 280px; flex: none; border-left: 1px solid var(--line); overflow-y: auto;
    padding: 18px 16px; background: rgba(255,255,255,.55); }
  .side-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: .05em; margin: 14px 0 8px; }
  .side-title:first-child { margin-top: 0; }
  .sideitem { display: block; width: 100%; text-align: left; background: var(--card);
    border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; font-size: 13px;
    color: var(--ink); margin-bottom: 6px; box-shadow: var(--shadow-sm); transition: all .15s ease; }
  .sideitem:hover { border-color: var(--purple); color: var(--purple); transform: translateX(2px); }
  .nextwrap { background: #efeafd; border: 1px solid #d5c9f6; border-radius: 12px; padding: 10px; margin-bottom: 8px; }
  .nextwrap .side-title { color: var(--purple-d); margin: 2px 0 8px; }
  .nextwrap .sideitem { border-color: #d5c9f6; }
  @media (max-width: 920px) { .side { display: none; } }

  /* Payment setup banner */
  .paybanner { margin: 14px 24px 0; max-width: 760px; align-self: center; width: calc(100% - 48px);
    background: var(--amber-bg); border: 1px solid #f0d18a; border-left: 4px solid #e8a93c;
    border-radius: 12px; padding: 12px 40px 12px 16px; font-size: 13.5px; color: #6b4d12;
    position: relative; box-shadow: var(--shadow-sm); }
  .paybanner button { position: absolute; right: 10px; top: 10px; background: none; border: none;
    color: #a3833d; font-size: 14px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .chip { background: var(--card); border: 1px solid var(--line); color: var(--ink);
    padding: 9px 14px; border-radius: 999px; font-size: 13px; box-shadow: var(--shadow-sm);
    transition: all .15s ease; }
  .chip:hover { border-color: var(--purple); color: var(--purple); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .hero { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 22px 24px;
    box-shadow: var(--shadow-md); margin-bottom: 6px; }
  .hero h2 { margin: 0 0 6px; font-size: 20px; }
  .hero p { margin: 0; color: var(--muted); font-size: 14px; }

  .msg { display: flex; align-items: flex-end; gap: 8px; }
  .msg.user { justify-content: flex-end; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--logo) center/cover no-repeat;
    flex: none; box-shadow: var(--shadow-sm); }
  .bubble { padding: 12px 15px; border-radius: 16px; font-size: 14.5px; line-height: 1.55; max-width: 80%;
    white-space: pre-wrap; }
  .msg.user .bubble { background: var(--grad); color: #fff; border-bottom-right-radius: 5px;
    box-shadow: var(--shadow-sm); }
  .msg.bot .bubble { background: var(--card); border: 1px solid var(--line); border-bottom-left-radius: 5px;
    box-shadow: var(--shadow-sm); }
  .bubble a { color: var(--purple); font-weight: 600; }
  .sugs { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; margin: 8px 0; }
  .sug { text-align: left; background: #f4f1ff; border: 1px solid #ddd5f6; color: var(--purple-d);
    padding: 8px 14px; border-radius: 999px; font-size: 13.5px; font-weight: 600; }
  .sug::after { content: " ›"; opacity: .6; }
  .sug:hover { background: var(--purple); border-color: var(--purple); color: #fff; }
  .fill { border-style: dashed !important; }
  .bubble code { background: var(--bg); border: 1px solid var(--line); border-radius: 5px; padding: 1px 5px; font-size: 13px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }

  .thinking .bubble { color: var(--muted); }
  .thinking .dots span { animation: blink 1.2s infinite both; }
  .thinking .dots span:nth-child(2){ animation-delay:.2s } .thinking .dots span:nth-child(3){ animation-delay:.4s }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* Proposal / approval card */
  .proposal { background: var(--amber-bg); border: 1px solid #f0d18a; border-left: 4px solid #e8a93c;
    border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow-md); }
  .proposal .ptitle { font-weight: 700; color: var(--amber); font-size: 13px; text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 8px; }
  .proposal pre { margin: 0 0 14px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px;
    white-space: pre-wrap; color: var(--ink); }
  .pactions { display: flex; gap: 10px; }
  .pactions button { padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 13px; border: none;
    transition: all .15s ease; }
  .pactions button:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .approve { background: var(--green); color: #fff; }
  .decline { background: #fff; border: 1px solid var(--line) !important; color: var(--muted); }
  .proposal.resolved .pactions { display: none; }
  .proposal.resolved { opacity: .7; }
  .pform { display: flex; flex-direction: column; gap: 8px; margin: 4px 0 14px; }
  .prow { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
  .prow span { flex: 0 0 160px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .prow input { flex: 1; border: 1px solid #eadfba; border-radius: 8px; padding: 8px 10px; font-size: 13.5px;
    background: #fffdf5; }
  .prow input:focus { outline: none; border-color: var(--amber); }

  .result { background: #ecfaf4; border: 1px solid #b9e8d4; border-radius: var(--radius);
    padding: 14px 16px; font-size: 14px; }
  .result a { color: var(--purple); font-weight: 600; }

  /* Rich blocks */
  .block { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow-sm); }
  .pcard { transition: all .15s ease; }
  .pcard:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: #d5cdf1; }
  .block-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 12px; }
  .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 12px; }
  .pcard { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .pimg { height: 90px; background-size: cover; background-position: center; background-color: #f0eefb; }
  .pimg.placeholder { display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: var(--purple); }
  .pmeta { padding: 9px 10px; }
  .pname { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .pprice { font-size: 13px; color: var(--purple); font-weight: 700; margin-top: 2px; }
  .pstock { display: inline-block; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .sgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(116px, 1fr)); gap: 10px; }
  .stile { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 12px; }
  .sval { font-size: 20px; font-weight: 700; }
  .skey { font-size: 11px; color: var(--muted); text-transform: capitalize; margin-top: 2px; }
  .rlist { display: flex; flex-direction: column; }
  .ritem { display: flex; align-items: center; gap: 10px; padding: 10px 2px; border-bottom: 1px solid var(--line); }
  .ritem:last-child { border-bottom: none; }
  .rmain { flex: 1; min-width: 0; }
  .rtitle { font-size: 14px; font-weight: 600; }
  .rsub { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rbadge { font-size: 11px; background: #efe9ff; color: var(--purple-d); padding: 3px 9px; border-radius: 999px; }

  /* Capability hints */
  .hints { display: flex; flex-direction: column; gap: 14px; }
  .hint-intro { font-size: 14px; color: var(--muted); }
  .hint-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .hint-row { display: flex; flex-wrap: wrap; gap: 8px; }

  footer { background: transparent; padding: 10px 20px 18px; }
  .composer { max-width: 760px; margin: 0 auto; display: flex; gap: 8px; background: var(--card);
    border: 1px solid var(--line); border-radius: 16px; padding: 8px; box-shadow: var(--shadow-md); }
  .composer input { flex: 1; border: none; padding: 10px 12px; font-size: 14.5px; background: transparent; }
  .composer input:focus { outline: none; }
  .composer .send { width: auto; padding: 10px 22px; margin: 0; border-radius: 11px; }
</style>
</head>
<body>

<!-- LOGIN -->
<section id="login">
  <form class="login-card" onsubmit="return false;">
    <div class="brand"><span class="dot"></span> ImpalaFlow Autopilot</div>
    <div class="sub">Sign in with your ImpalaFlow account.</div>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@example.com" />
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button class="btn" id="loginBtn">Sign in</button>
    <div class="err" id="loginErr"></div>
  </form>
</section>

<!-- CHAT -->
<section id="chat" class="hidden">
  <header>
    <div class="brand"><span class="dot"></span> Autopilot</div>
    <span class="status">online</span>
    <span class="who" id="who"></span>
    <button class="logout" id="logoutBtn">Sign out</button>
  </header>
  <div class="body-row">
    <div class="main">
      <div id="paybanner" class="paybanner hidden">
        ⚠️ <b>This store can't receive online payments yet.</b> Invoices will send, but customers can't pay
        until you set up payment collection (bank or mobile money) in your ImpalaFlow dashboard →
        Invoicing → Payment settings.
        <button id="paybannerClose" title="Dismiss">✕</button>
      </div>
      <div class="stream"><div class="wrap" id="stream">
        <div class="chips" id="chips"></div>
      </div></div>
      <footer><div class="composer">
        <input id="input" placeholder="Message Autopilot…  e.g. invoice Ama for 2 bags of rice" autocomplete="off" />
        <button class="btn send" id="sendBtn">Send</button>
      </div></footer>
    </div>
    <aside class="side" id="side"></aside>
  </div>
</section>

<script>
let token = null;
let history = [];
const $ = (id) => document.getElementById(id);

// Same-origin when served over http(s); fall back to a local base when the page
// is opened without an http origin (e.g. a preview panel using srcdoc/file://).
// Same-origin when served by the agent service itself (FC, localhost);
// otherwise (GitHub Pages, previews) talk to the deployed API on Alibaba Cloud.
const DEPLOYED_API = "https://impala-utopilot-seirlydawn.ap-southeast-1.fcapp.run";
const API_BASE = (() => {
  if (!/^https?:$/.test(location.protocol)) return "http://localhost:8787";
  const h = location.hostname;
  return h.endsWith("fcapp.run") || h === "localhost" || h === "127.0.0.1"
    ? ""
    : DEPLOYED_API;
})();

// Items are either complete commands (click = run) or templates with ⟨placeholders⟩
// (click = drop into the composer for editing, first placeholder pre-selected).
const HINTS = [
  { group: "Business", items: [
    "How is my business doing this week?",
    "Any overdue invoices?",
  ]},
  { group: "Catalog", items: [
    "What's in my catalog?",
    { label: "Add products from a price list", text: "Add these products to my catalog:\n⟨paste your price list — name, price, stock⟩" },
  ]},
  { group: "Invoicing", items: [
    { label: "Invoice a customer", text: "Invoice ⟨customer name⟩ (⟨email⟩) for ⟨quantity and product⟩" },
    "Chase my unpaid invoices",
  ]},
  { group: "Contacts", items: [
    "Show my customers",
    { label: "Customer history", text: "What's my history with ⟨customer name⟩?" },
    { label: "Add a new contact", text: "Add a new contact: ⟨name⟩, ⟨email⟩, ⟨phone⟩" },
  ]},
  { group: "Fundraising", items: ["How are my donation campaigns doing?"] },
  { group: "Forms", items: ["List my smart forms and their submissions"] },
];

const PLACEHOLDER_RE = /⟨[^⟩]*⟩|\[[^\]]{3,40}\]/;

function fillComposer(text) {
  const input = $("input");
  input.value = text.replace(/\n/g, " ");
  input.focus();
  const m = input.value.match(/⟨[^⟩]*⟩|\[[^\]]{3,40}\]/);
  if (m) input.setSelectionRange(m.index, m.index + m[0].length);
}

/** Click behavior for any suggestion: templates fill the composer, commands run. */
function actOn(text) {
  if (PLACEHOLDER_RE.test(text)) fillComposer(text);
  else send(text);
}

function hintButton(item, className) {
  const label = typeof item === "string" ? item : item.label;
  const text = typeof item === "string" ? item : item.text;
  const isTemplate = PLACEHOLDER_RE.test(text);
  const b = document.createElement("button");
  b.className = className + (isTemplate ? " fill" : "");
  b.textContent = label + (isTemplate ? " ✏️" : "");
  b.onclick = () => actOn(text);
  return b;
}

const STORAGE_KEY = "autopilot_session";
const CHAT_KEY = "autopilot_chat";

function saveChat() {
  try { localStorage.setItem(CHAT_KEY, JSON.stringify(history.slice(-30))); } catch { /* ignore */ }
}

function handleAuthFailure(status) {
  if (status === 401 && token) {
    logout();
    throw new Error("Your session expired — please sign in again.");
  }
}

async function api(path, body) {
  const res = await fetch(API_BASE + path, {
    method: "POST",
    headers: { "Content-Type": "application/json", ...(token ? { Authorization: "Bearer " + token } : {}) },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    if (path !== "/auth/login") handleAuthFailure(res.status);
    throw new Error(data.error || "HTTP " + res.status);
  }
  return data;
}

async function apiGet(path) {
  const res = await fetch(API_BASE + path, {
    headers: token ? { Authorization: "Bearer " + token } : {},
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) { handleAuthFailure(res.status); throw new Error(data.error || "HTTP " + res.status); }
  return data;
}

function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

// "171320.00" -> "171,320" · "8.50" -> "8.50" · "NGN" stays as-is.
function fmtNum(v) {
  if (typeof v !== "number" && !(typeof v === "string" && /^-?\d+(\.\d+)?$/.test(v.trim()))) return v;
  const n = Number(v);
  if (!isFinite(n)) return v;
  const hasCents = Math.round(n * 100) % 100 !== 0;
  return n.toLocaleString("en", { minimumFractionDigits: hasCents ? 2 : 0, maximumFractionDigits: 2 });
}

// Minimal safe markdown: escape first, then bold/italic/code/links/bullets.
// Only http(s) hrefs survive; broken image syntax degrades to a plain link.
function md(s) {
  let t = esc(s);
  t = t.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, (_, a, u) => mdLink(a || u, u));
  t = t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, a, u) => mdLink(a, u));
  t = t.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, (_, p, u) => p + mdLink(u, u));
  t = t.replace(/`([^`]+)`/g, "<code>$1</code>");
  t = t.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
  t = t.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<i>$2</i>");
  t = t.replace(/^[ \t]*[-•]\s+(.+)$/gm, "•&nbsp;$1");
  return t;
}
function mdLink(label, url) {
  if (!/^https?:\/\//i.test(url)) return label;
  return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
}
function scroll() { const s = document.querySelector(".stream"); s.scrollTop = s.scrollHeight; }

function addBubble(who, text) {
  const row = document.createElement("div");
  row.className = "msg " + who;
  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if (who !== "bot") {
    bubble.textContent = text;
  } else {
    // Bot bubbles: markdown paragraphs, and bullet lines become clickable
    // action chips that send themselves as the next message.
    const lines = String(text).split("\n");
    let para = [];
    const flush = () => {
      if (!para.length) return;
      const p = document.createElement("div");
      p.innerHTML = md(para.join("\n"));
      bubble.appendChild(p);
      para = [];
    };
    let sugWrap = null;
    for (const line of lines) {
      // Only "-> " lines are actionable suggestions (tappable); "-" bullets are facts.
      const m = line.match(/^[ \t]*(?:->|→)\s+(.+)$/);
      if (m) {
        flush();
        if (!sugWrap) {
          sugWrap = document.createElement("div");
          sugWrap.className = "sugs";
          bubble.appendChild(sugWrap);
        }
        const label = m[1].replace(/\*\*|`/g, "").trim();
        const b = document.createElement("button");
        b.className = "sug" + (PLACEHOLDER_RE.test(label) ? " fill" : "");
        b.textContent = label + (PLACEHOLDER_RE.test(label) ? " ✏️" : "");
        b.onclick = () => actOn(label);
        sugWrap.appendChild(b);
      } else {
        sugWrap = null;
        para.push(line);
      }
    }
    flush();
  }

  if (who === "bot") {
    const av = document.createElement("div");
    av.className = "avatar";
    row.appendChild(av);
  }
  row.appendChild(bubble);
  $("stream").appendChild(row); scroll();
  return row;
}
function addThinking() {
  const row = document.createElement("div");
  row.className = "msg bot thinking";
  row.innerHTML = `<div class="avatar"></div><div class="bubble">Autopilot is working<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`;
  $("stream").appendChild(row); scroll();
  return row;
}

function addProposal(p) {
  const card = document.createElement("div");
  card.className = "proposal";
  card.innerHTML = `<div class="ptitle">✋ Approval needed</div><pre>${esc(p.preview)}</pre>`;
  const editWrap = document.createElement("div");
  editWrap.className = "pform hidden";
  card.appendChild(editWrap);

  const actions = document.createElement("div");
  actions.className = "pactions";
  const approve = document.createElement("button");
  approve.className = "approve"; approve.textContent = "Approve & run";
  const edit = document.createElement("button");
  edit.className = "decline"; edit.textContent = "Edit";
  const decline = document.createElement("button");
  decline.className = "decline"; decline.textContent = "Decline";

  const editable = p.tool === "create_invoice";
  let editing = false;
  const fields = { qty: [], name: null, email: null, note: null };

  function buildEditor() {
    const a = p.args || {};
    editWrap.innerHTML = "";
    const row = (label, input) => {
      const r = document.createElement("label");
      r.className = "prow";
      r.append(Object.assign(document.createElement("span"), { textContent: label }), input);
      editWrap.appendChild(r);
    };
    fields.name = Object.assign(document.createElement("input"), { value: a.customer_name || "" });
    fields.email = Object.assign(document.createElement("input"), { value: a.customer_email || "" });
    row("Customer", fields.name);
    row("Email", fields.email);
    fields.qty = (a.items || []).map((it) => {
      const q = Object.assign(document.createElement("input"), { type: "number", min: "1", value: it.quantity });
      row(`${it.name} — qty`, q);
      return q;
    });
    fields.note = Object.assign(document.createElement("input"), { value: a.note || "", placeholder: "Note (optional)" });
    row("Note", fields.note);
  }

  function collectArgs() {
    const a = JSON.parse(JSON.stringify(p.args || {}));
    a.customer_name = fields.name.value.trim() || a.customer_name;
    a.customer_email = fields.email.value.trim() || a.customer_email;
    (a.items || []).forEach((it, i) => { it.quantity = Number(fields.qty[i]?.value) || it.quantity; });
    if (fields.note.value.trim()) a.note = fields.note.value.trim();
    return a;
  }

  approve.onclick = async () => {
    const args = editing ? collectArgs() : p.args;
    card.classList.add("resolved");
    const th = addThinking();
    try {
      const data = await api("/agent/approve", { proposal: { tool: p.tool, args } });
      th.remove(); renderResult(data.result);
    } catch (e) { th.remove(); addBubble("bot", "⚠ " + e.message); }
  };
  edit.onclick = () => {
    editing = !editing;
    if (editing && !editWrap.childElementCount) buildEditor();
    editWrap.classList.toggle("hidden", !editing);
    card.querySelector("pre").classList.toggle("hidden", editing);
    edit.textContent = editing ? "Back to preview" : "Edit";
    approve.textContent = editing ? "Approve edited" : "Approve & run";
  };
  decline.onclick = () => { card.classList.add("resolved"); addBubble("bot", "Okay — I won't do that."); };

  actions.append(approve);
  if (editable) actions.append(edit);
  actions.append(decline);
  card.appendChild(actions);
  $("stream").appendChild(card); scroll();
}

function renderResult(r) {
  const div = document.createElement("div");
  div.className = "result";
  if (r && r.pay_link) {
    div.innerHTML = `✅ Invoice <b>${esc(r.invoice_number || "")}</b> — ${esc(r.currency || "")} ${esc(r.total)}` +
      ` · status <b>${esc(r.status)}</b>` + (r.sent ? " · sent to customer" : "") +
      `<br><a href="${esc(r.pay_link)}" target="_blank" rel="noopener">Open pay link →</a>`;
    setNextActions(["Show my unpaid invoices", "How is my business doing?"]);
  } else if (r && r.contact) {
    div.innerHTML = `✅ Contact added: <b>${esc(r.contact.name)}</b>` +
      ` — ${esc(r.contact.email)}${r.contact.phone ? " · " + esc(r.contact.phone) : ""}`;
    setNextActions([`What's my history with ${r.contact.name}?`, "Show my customers"]);
  } else if (r && r.created_count !== undefined) {
    div.innerHTML = `✅ Created <b>${esc(r.created_count)}</b> products` +
      (r.failed && r.failed.length ? ` · ${r.failed.length} failed` : "");
    setNextActions(["Show my catalog", "Which items are low on stock?"]);
  } else if (r && r.declined === undefined && r.ok !== undefined) {
    div.textContent = r.ok ? "✅ Done." : "⚠ Something went wrong.";
  } else {
    div.textContent = "Done: " + JSON.stringify(r);
  }
  $("stream").appendChild(div); scroll();
}

function renderBlocks(blocks) {
  blocks.forEach(b => {
    if (b.type === "products") renderProducts(b);
    else if (b.type === "stats") renderStats(b);
    else if (b.type === "list") renderList(b);
  });
  scroll();
}

function renderProducts(b) {
  const wrap = document.createElement("div"); wrap.className = "block";
  wrap.innerHTML = `<div class="block-title">${esc(b.title || "Products")}</div>`;
  const grid = document.createElement("div"); grid.className = "pgrid";
  (b.items || []).forEach(p => {
    const card = document.createElement("div"); card.className = "pcard";
    const img = p.image_url
      ? `<div class="pimg" style="background-image:url('${esc(p.image_url)}')"></div>`
      : `<div class="pimg placeholder">${esc(String(p.name || "?").slice(0, 1))}</div>`;
    const price = (b.currency ? esc(b.currency) + " " : "") + esc(fmtNum(p.price));
    const stock = (p.stock === null || p.stock === undefined)
      ? "" : `<span class="pstock">${esc(p.stock)} in stock</span>`;
    card.innerHTML = `${img}<div class="pmeta"><div class="pname">${esc(p.name)}</div>` +
      `<div class="pprice">${price}</div>${stock}</div>`;
    grid.appendChild(card);
  });
  wrap.appendChild(grid); $("stream").appendChild(wrap);
}

function renderStats(b) {
  const wrap = document.createElement("div"); wrap.className = "block";
  wrap.innerHTML = `<div class="block-title">${esc(b.title || "Stats")}</div>`;
  const grid = document.createElement("div"); grid.className = "sgrid";
  Object.entries(b.stats || {}).forEach(([k, v]) => {
    if (v === null || typeof v === "object") return;
    const tile = document.createElement("div"); tile.className = "stile";
    tile.innerHTML = `<div class="sval">${esc(fmtNum(v))}</div><div class="skey">${esc(String(k).replace(/_/g, " "))}</div>`;
    grid.appendChild(tile);
  });
  wrap.appendChild(grid); $("stream").appendChild(wrap);
}

function renderList(b) {
  const wrap = document.createElement("div"); wrap.className = "block";
  wrap.innerHTML = `<div class="block-title">${esc(b.title || "List")}</div>`;
  const list = document.createElement("div"); list.className = "rlist";
  (b.items || []).forEach(it => {
    const row = document.createElement("div"); row.className = "ritem";
    row.innerHTML = `<div class="rmain"><div class="rtitle">${esc(it.title || "")}</div>` +
      `<div class="rsub">${esc(it.subtitle || "")}</div></div>` +
      (it.badge ? `<span class="rbadge">${esc(it.badge)}</span>` : "");
    list.appendChild(row);
  });
  wrap.appendChild(list); $("stream").appendChild(wrap);
}

async function send(text) {
  const msg = (text ?? $("input").value).trim();
  if (!msg) return;
  $("input").value = "";
  const hints = document.getElementById("chips");
  if (hints) hints.remove();
  addBubble("user", msg);
  const th = addThinking();
  try {
    const data = await api("/agent/chat", { message: msg, history, channel: "dashboard" });
    th.remove();
    if (data.answer) addBubble("bot", data.answer);
    // When an approval card is coming, skip the lookup-noise blocks — the
    // proposal preview is the thing to read.
    if (data.blocks && data.blocks.length && !data.proposal) renderBlocks(data.blocks);
    history.push({ role: "user", content: msg });
    history.push({ role: "assistant", content: data.answer || "" });
    saveChat();
    if (data.proposal) addProposal(data.proposal);
  } catch (e) {
    th.remove(); addBubble("bot", "⚠ " + e.message);
  }
}

function enterChat(who) {
  $("who").textContent = who || "Merchant";
  $("login").classList.add("hidden");
  $("chat").classList.remove("hidden");
  renderHints();
  buildSideMenu();
  // Resume the conversation (text only — one-time cards/proposals don't replay).
  try {
    const saved = JSON.parse(localStorage.getItem(CHAT_KEY) || "[]");
    if (Array.isArray(saved) && saved.length) {
      document.getElementById("chips")?.remove();
      history = saved;
      for (const m of saved) {
        if (!m || !m.content) continue;
        addBubble(m.role === "user" ? "user" : "bot", m.content);
      }
    }
  } catch { /* ignore corrupt chat storage */ }
  $("input").focus();
  // Payment-readiness check: warn new stores that pay links can't accept
  // money until payment collection is configured. Also validates a restored
  // session — a stale token drops back to the login screen via the 401 path.
  apiGet("/merchant/context").then(ctx => {
    if (ctx && ctx.payment_ready === false) {
      $("paybanner").classList.remove("hidden");
    }
  }).catch(() => {});
}

async function login() {
  const email = $("email").value.trim();
  const password = $("password").value;
  if (!email || !password) return;
  $("loginBtn").disabled = true; $("loginErr").textContent = "";
  try {
    const data = await api("/auth/login", { email, password });
    token = data.access_token;
    const who = data.company_name || data.first_name || data.email || "Merchant";
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ token, who }));
    } catch { /* private mode etc. */ }
    enterChat(who);
  } catch (e) {
    $("loginErr").textContent = e.message;
  } finally {
    $("loginBtn").disabled = false;
  }
}


const GROUP_ICONS = { Business: "📊", Catalog: "📦", Invoicing: "🧾", Contacts: "👥", Fundraising: "💜", Forms: "📝" };

function buildSideMenu() {
  const side = $("side");
  side.innerHTML = `<div class="nextwrap hidden" id="nextwrap"><div class="side-title">✨ Suggested next</div><div id="nextItems"></div></div>`;
  HINTS.forEach(h => {
    const t = document.createElement("div");
    t.className = "side-title";
    t.textContent = `${GROUP_ICONS[h.group] ?? ""} ${h.group}`;
    side.appendChild(t);
    h.items.forEach(item => side.appendChild(hintButton(item, "sideitem")));
  });
}

function setNextActions(labels) {
  const wrap = document.getElementById("nextwrap");
  const items = document.getElementById("nextItems");
  if (!wrap || !items) return;
  items.innerHTML = "";
  labels.filter(Boolean).forEach(s => items.appendChild(hintButton(s, "sideitem")));
  wrap.classList.toggle("hidden", labels.length === 0);
}

function renderHints() {
  const c = $("chips");
  c.className = "hints";
  const hour = new Date().getHours();
  const daypart = hour < 12 ? "morning" : hour < 17 ? "afternoon" : "evening";
  const store = $("who").textContent || "there";
  c.innerHTML = `<div class="hero"><h2>Good ${daypart}, ${esc(store)} 👋</h2>` +
    `<p>I'm your Autopilot — I can sell, bill, chase payments, and remember every customer. ` +
    `Tap a suggestion or just type like you'd text a person.</p></div>`;
  HINTS.forEach(h => {
    const g = document.createElement("div");
    g.innerHTML = `<div class="hint-label">${GROUP_ICONS[h.group] ?? ""} ${h.group}</div>`;
    const row = document.createElement("div"); row.className = "hint-row";
    h.items.forEach(item => row.appendChild(hintButton(item, "chip")));
    g.appendChild(row); c.appendChild(g);
  });
}

function logout() {
  try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(CHAT_KEY); } catch { /* ignore */ }
  token = null; history = [];
  $("stream").innerHTML = '<div class="chips" id="chips"></div>';
  $("chat").classList.add("hidden");
  $("login").classList.remove("hidden");
}

$("loginBtn").onclick = login;
$("password").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
$("sendBtn").onclick = () => send();
$("input").addEventListener("keydown", e => { if (e.key === "Enter") send(); });
$("logoutBtn").onclick = logout;
$("paybannerClose").onclick = () => $("paybanner").classList.add("hidden");

// Restore a persisted session on page load (placed last: everything is defined).
try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
  if (saved && saved.token) {
    token = saved.token;
    enterChat(saved.who);
  }
} catch { /* ignore corrupt storage */ }
</script>
</body>
</html>
