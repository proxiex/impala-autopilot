<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ImpalaFlow Autopilot</title>
<style>
  :root {
    --purple: #6C4CE0; --purple-d: #5338c4; --ink: #1c1b22; --muted: #6b6a76;
    --line: #e7e5ef; --bg: #f6f5fb; --card: #ffffff; --amber: #b7791f; --amber-bg: #fef7e6;
    --green: #1d9e75; --radius: 14px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--ink); background: var(--bg); height: 100vh; }
  .hidden { display: none !important; }

  /* Login */
  #login { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 32px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(40,30,90,.08); }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; margin-bottom: 4px; }
  .dot { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--purple), #9b7cff); }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin: 14px 0 6px; }
  input { width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px; }
  input:focus { outline: none; border-color: var(--purple); }
  button { cursor: pointer; font-family: inherit; }
  .btn { background: var(--purple); color: #fff; border: none; padding: 12px; border-radius: 10px;
    font-weight: 600; font-size: 14px; width: 100%; margin-top: 20px; }
  .btn:hover { background: var(--purple-d); }
  .btn:disabled { opacity: .6; cursor: default; }
  .err { color: #c0392b; font-size: 13px; margin-top: 12px; min-height: 16px; }

  /* Chat shell */
  #chat { height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--card); border-bottom: 1px solid var(--line); padding: 12px 20px;
    display: flex; align-items: center; gap: 12px; }
  header .brand { font-size: 16px; margin: 0; }
  header .who { margin-left: auto; font-size: 13px; color: var(--muted); }
  header .logout { background: none; border: 1px solid var(--line); color: var(--muted);
    padding: 6px 12px; border-radius: 8px; font-size: 13px; }

  .stream { flex: 1; overflow-y: auto; padding: 24px; }
  .wrap { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .chip { background: var(--card); border: 1px solid var(--line); color: var(--ink);
    padding: 8px 12px; border-radius: 999px; font-size: 13px; }
  .chip:hover { border-color: var(--purple); color: var(--purple); }

  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble { padding: 12px 15px; border-radius: 14px; font-size: 14.5px; line-height: 1.5; max-width: 80%;
    white-space: pre-wrap; }
  .msg.user .bubble { background: var(--purple); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: var(--card); border: 1px solid var(--line); border-bottom-left-radius: 4px; }

  .thinking .bubble { color: var(--muted); }
  .thinking .dots span { animation: blink 1.2s infinite both; }
  .thinking .dots span:nth-child(2){ animation-delay:.2s } .thinking .dots span:nth-child(3){ animation-delay:.4s }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* Proposal / approval card */
  .proposal { background: var(--amber-bg); border: 1px solid #f3d999; border-radius: var(--radius); padding: 16px; }
  .proposal .ptitle { font-weight: 700; color: var(--amber); font-size: 13px; text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 8px; }
  .proposal pre { margin: 0 0 14px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px;
    white-space: pre-wrap; color: var(--ink); }
  .pactions { display: flex; gap: 10px; }
  .pactions button { padding: 9px 16px; border-radius: 9px; font-weight: 600; font-size: 13px; border: none; }
  .approve { background: var(--green); color: #fff; }
  .decline { background: #fff; border: 1px solid var(--line) !important; color: var(--muted); }
  .proposal.resolved .pactions { display: none; }
  .proposal.resolved { opacity: .7; }

  .result { background: #ecfaf4; border: 1px solid #b9e8d4; border-radius: var(--radius);
    padding: 14px 16px; font-size: 14px; }
  .result a { color: var(--purple); font-weight: 600; }

  /* Rich blocks */
  .block { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; }
  .block-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 12px; }
  .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 12px; }
  .pcard { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .pimg { height: 90px; background-size: cover; background-position: center; background-color: #f0eefb; }
  .pimg.placeholder { display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: var(--purple); }
  .pmeta { padding: 9px 10px; }
  .pname { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .pprice { font-size: 13px; color: var(--purple); font-weight: 700; margin-top: 2px; }
  .pstock { display: inline-block; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .sgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(116px, 1fr)); gap: 10px; }
  .stile { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 12px; }
  .sval { font-size: 20px; font-weight: 700; }
  .skey { font-size: 11px; color: var(--muted); text-transform: capitalize; margin-top: 2px; }
  .rlist { display: flex; flex-direction: column; }
  .ritem { display: flex; align-items: center; gap: 10px; padding: 10px 2px; border-bottom: 1px solid var(--line); }
  .ritem:last-child { border-bottom: none; }
  .rmain { flex: 1; min-width: 0; }
  .rtitle { font-size: 14px; font-weight: 600; }
  .rsub { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rbadge { font-size: 11px; background: #efe9ff; color: var(--purple-d); padding: 3px 9px; border-radius: 999px; }

  /* Capability hints */
  .hints { display: flex; flex-direction: column; gap: 14px; }
  .hint-intro { font-size: 14px; color: var(--muted); }
  .hint-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .hint-row { display: flex; flex-wrap: wrap; gap: 8px; }

  footer { border-top: 1px solid var(--line); background: var(--card); padding: 14px 20px; }
  .composer { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; }
  .composer input { flex: 1; }
  .composer .send { width: auto; padding: 11px 20px; margin: 0; }
</style>
</head>
<body>

<!-- LOGIN -->
<section id="login">
  <form class="login-card" onsubmit="return false;">
    <div class="brand"><span class="dot"></span> ImpalaFlow Autopilot</div>
    <div class="sub">Sign in with your ImpalaFlow account.</div>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@example.com" />
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button class="btn" id="loginBtn">Sign in</button>
    <div class="err" id="loginErr"></div>
  </form>
</section>

<!-- CHAT -->
<section id="chat" class="hidden">
  <header>
    <div class="brand"><span class="dot"></span> Autopilot</div>
    <span class="who" id="who"></span>
    <button class="logout" id="logoutBtn">Sign out</button>
  </header>
  <div class="stream"><div class="wrap" id="stream">
    <div class="chips" id="chips"></div>
  </div></div>
  <footer><div class="composer">
    <input id="input" placeholder="Message Autopilot…  e.g. invoice Ama for 2 bags of rice" autocomplete="off" />
    <button class="btn send" id="sendBtn">Send</button>
  </div></footer>
</section>

<script>
let token = null;
let history = [];
const $ = (id) => document.getElementById(id);

// Same-origin when served over http(s); fall back to a local base when the page
// is opened without an http origin (e.g. a preview panel using srcdoc/file://).
const API_BASE = /^https?:$/.test(location.protocol) ? "" : "http://localhost:8787";

const HINTS = [
  { group: "Business", items: ["How is my business doing this week?", "Any overdue invoices?"] },
  { group: "Catalog", items: ["What's in my catalog?", "Which items are low on stock?"] },
  { group: "Invoicing", items: ["Invoice Ama (ama.demo@gmail.com) for 2 Bag of Rice 25kg"] },
  { group: "Contacts", items: ["Find the contact named Kwame"] },
  { group: "Fundraising", items: ["How are my donation campaigns doing?"] },
  { group: "Forms", items: ["List my smart forms and their submissions"] },
];

async function api(path, body) {
  const res = await fetch(API_BASE + path, {
    method: "POST",
    headers: { "Content-Type": "application/json", ...(token ? { Authorization: "Bearer " + token } : {}) },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || "HTTP " + res.status);
  return data;
}

function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
function scroll() { const s = document.querySelector(".stream"); s.scrollTop = s.scrollHeight; }

function addBubble(who, text) {
  const row = document.createElement("div");
  row.className = "msg " + who;
  row.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  $("stream").appendChild(row); scroll();
  return row;
}
function addThinking() {
  const row = document.createElement("div");
  row.className = "msg bot thinking";
  row.innerHTML = `<div class="bubble">Autopilot is working<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`;
  $("stream").appendChild(row); scroll();
  return row;
}

function addProposal(p) {
  const card = document.createElement("div");
  card.className = "proposal";
  card.innerHTML = `<div class="ptitle">Approval needed</div><pre>${esc(p.preview)}</pre>`;
  const actions = document.createElement("div");
  actions.className = "pactions";
  const approve = document.createElement("button");
  approve.className = "approve"; approve.textContent = "Approve & run";
  const decline = document.createElement("button");
  decline.className = "decline"; decline.textContent = "Decline";
  approve.onclick = async () => {
    card.classList.add("resolved");
    const th = addThinking();
    try {
      const data = await api("/agent/approve", { proposal: { tool: p.tool, args: p.args } });
      th.remove(); renderResult(data.result);
    } catch (e) { th.remove(); addBubble("bot", "⚠ " + e.message); }
  };
  decline.onclick = () => { card.classList.add("resolved"); addBubble("bot", "Okay — I won't do that."); };
  actions.append(approve, decline); card.appendChild(actions);
  $("stream").appendChild(card); scroll();
}

function renderResult(r) {
  const div = document.createElement("div");
  div.className = "result";
  if (r && r.pay_link) {
    div.innerHTML = `✅ Invoice <b>${esc(r.invoice_number || "")}</b> — ${esc(r.currency || "")} ${esc(r.total)}` +
      ` · status <b>${esc(r.status)}</b>` + (r.sent ? " · sent to customer" : "") +
      `<br><a href="${esc(r.pay_link)}" target="_blank" rel="noopener">Open pay link →</a>`;
  } else {
    div.textContent = "Done: " + JSON.stringify(r);
  }
  $("stream").appendChild(div); scroll();
}

function renderBlocks(blocks) {
  blocks.forEach(b => {
    if (b.type === "products") renderProducts(b);
    else if (b.type === "stats") renderStats(b);
    else if (b.type === "list") renderList(b);
  });
  scroll();
}

function renderProducts(b) {
  const wrap = document.createElement("div"); wrap.className = "block";
  wrap.innerHTML = `<div class="block-title">${esc(b.title || "Products")}</div>`;
  const grid = document.createElement("div"); grid.className = "pgrid";
  (b.items || []).forEach(p => {
    const card = document.createElement("div"); card.className = "pcard";
    const img = p.image_url
      ? `<div class="pimg" style="background-image:url('${esc(p.image_url)}')"></div>`
      : `<div class="pimg placeholder">${esc(String(p.name || "?").slice(0, 1))}</div>`;
    const price = (b.currency ? esc(b.currency) + " " : "") + esc(p.price);
    const stock = (p.stock === null || p.stock === undefined)
      ? "" : `<span class="pstock">${esc(p.stock)} in stock</span>`;
    card.innerHTML = `${img}<div class="pmeta"><div class="pname">${esc(p.name)}</div>` +
      `<div class="pprice">${price}</div>${stock}</div>`;
    grid.appendChild(card);
  });
  wrap.appendChild(grid); $("stream").appendChild(wrap);
}

function renderStats(b) {
  const wrap = document.createElement("div"); wrap.className = "block";
  wrap.innerHTML = `<div class="block-title">${esc(b.title || "Stats")}</div>`;
  const grid = document.createElement("div"); grid.className = "sgrid";
  Object.entries(b.stats || {}).forEach(([k, v]) => {
    if (v === null || typeof v === "object") return;
    const tile = document.createElement("div"); tile.className = "stile";
    tile.innerHTML = `<div class="sval">${esc(v)}</div><div class="skey">${esc(String(k).replace(/_/g, " "))}</div>`;
    grid.appendChild(tile);
  });
  wrap.appendChild(grid); $("stream").appendChild(wrap);
}

function renderList(b) {
  const wrap = document.createElement("div"); wrap.className = "block";
  wrap.innerHTML = `<div class="block-title">${esc(b.title || "List")}</div>`;
  const list = document.createElement("div"); list.className = "rlist";
  (b.items || []).forEach(it => {
    const row = document.createElement("div"); row.className = "ritem";
    row.innerHTML = `<div class="rmain"><div class="rtitle">${esc(it.title || "")}</div>` +
      `<div class="rsub">${esc(it.subtitle || "")}</div></div>` +
      (it.badge ? `<span class="rbadge">${esc(it.badge)}</span>` : "");
    list.appendChild(row);
  });
  wrap.appendChild(list); $("stream").appendChild(wrap);
}

async function send(text) {
  const msg = (text ?? $("input").value).trim();
  if (!msg) return;
  $("input").value = "";
  const hints = document.getElementById("chips");
  if (hints) hints.remove();
  addBubble("user", msg);
  const th = addThinking();
  try {
    const data = await api("/agent/chat", { message: msg, history, channel: "dashboard" });
    th.remove();
    if (data.answer) addBubble("bot", data.answer);
    if (data.blocks && data.blocks.length) renderBlocks(data.blocks);
    history.push({ role: "user", content: msg });
    history.push({ role: "assistant", content: data.answer || "" });
    if (data.proposal) addProposal(data.proposal);
  } catch (e) {
    th.remove(); addBubble("bot", "⚠ " + e.message);
  }
}

async function login() {
  const email = $("email").value.trim();
  const password = $("password").value;
  if (!email || !password) return;
  $("loginBtn").disabled = true; $("loginErr").textContent = "";
  try {
    const data = await api("/auth/login", { email, password });
    token = data.access_token;
    $("who").textContent = (data.company_name || data.first_name || data.email || "Merchant");
    $("login").classList.add("hidden");
    $("chat").classList.remove("hidden");
    renderHints();
    $("input").focus();
  } catch (e) {
    $("loginErr").textContent = e.message;
  } finally {
    $("loginBtn").disabled = false;
  }
}

function renderHints() {
  const c = $("chips");
  c.className = "hints";
  c.innerHTML = '<div class="hint-intro">👋 I can help across your whole ImpalaFlow business — try one of these:</div>';
  HINTS.forEach(h => {
    const g = document.createElement("div");
    g.innerHTML = `<div class="hint-label">${h.group}</div>`;
    const row = document.createElement("div"); row.className = "hint-row";
    h.items.forEach(s => {
      const b = document.createElement("button");
      b.className = "chip"; b.textContent = s;
      b.onclick = () => send(s);
      row.appendChild(b);
    });
    g.appendChild(row); c.appendChild(g);
  });
}

function logout() {
  token = null; history = [];
  $("stream").innerHTML = '<div class="chips" id="chips"></div>';
  $("chat").classList.add("hidden");
  $("login").classList.remove("hidden");
}

$("loginBtn").onclick = login;
$("password").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
$("sendBtn").onclick = () => send();
$("input").addEventListener("keydown", e => { if (e.key === "Enter") send(); });
$("logoutBtn").onclick = logout;
</script>
</body>
</html>
